<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>どすこい！どうぶつ場所（完全調整版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fdf5e6;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 土俵エリア：配置を安定させるためrelativeのみに */
        #stage {
            flex: 1;
            width: 100%;
            position: relative;
            background: radial-gradient(circle, #e0c5a0 60%, #8b4513 61%, #8b4513 63%, transparent 64%);
            overflow: hidden;
        }

        /* 動物たちの共通設定 */
        .animal {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            bottom: 50%; 
            width: fit-content; /* 中身（絵文字）の幅に合わせる */
            transition: left 0.1s ease-out;
        }

        /* 接点を基準とした左右の配置：これでピッタリくっつきます */
        #player {
            /* 右端が指定座標(left)にくるように左へ100%ずらす */
            transform: translate(-100%, 50%); 
        }
        #enemy {
            /* 左端が指定座標(left)にくるようにする */
            transform: translate(0%, 50%); 
        }

        #p-emoji, #e-emoji {
            font-size: 100px;
            line-height: 1;
            display: block;
            white-space: nowrap;
        }

        /* プレイヤーの星 */
        .player-star {
            color: gold;
            font-size: 40px;
            height: 40px;
            animation: star-blink 1s infinite alternate;
        }

        @keyframes star-blink {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 敵側のemoji反転 */
        #e-emoji { transform: scaleX(-1); }

        .name-tag {
            font-size: 18px;
            background: white;
            padding: 2px 10px;
            border-radius: 10px;
            color: #333;
            font-weight: bold;
            border: 2px solid #ccc;
            white-space: nowrap;
            margin-top: 5px;
        }

        /* 操作エリア */
        #input-area {
            height: 40%;
            width: 100%;
            background-color: #ff6347;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 -10px 0 rgba(0,0,0,0.1);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #input-area.disabled {
            background-color: #ccc;
        }

        #input-area:not(.disabled):active {
            background-color: #ff4500;
        }

        #input-message {
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-align: center;
        }

        .count-number {
            font-size: 80px;
            color: yellow;
            animation: count-down-pop 0.5s ease-out;
        }

        @keyframes count-down-pop {
            0% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* メッセージ */
        #msg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify(content): center;
            align-items: center;
            z-index: 100;
        }

        .btn {
            background: #fff;
            padding: 20px 40px;
            font-size: 32px;
            border-radius: 50px;
            border: 5px solid #ff6347;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #ccc;
        }

        #title-text {
            color: white;
            font-size: 42px;
            text-shadow: 3px 3px 0 #000;
            text-align: center;
            line-height: 1.4;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: pop 0.5s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2) translateY(-50px); opacity: 0; }
        }

        /* 揺れるアニメーション */
        @keyframes shake-p {
            0% { transform: translate(-100%, 50%) rotate(0deg); }
            50% { transform: translate(-100%, 50%) rotate(-5deg); }
            100% { transform: translate(-100%, 50%) rotate(0deg); }
        }
        @keyframes shake-e {
            0% { transform: translate(0%, 50%) rotate(0deg); }
            50% { transform: translate(0%, 50%) rotate(5deg); }
            100% { transform: translate(0%, 50%) rotate(0deg); }
        }
        .shaking-p { animation: shake-p 0.3s ease-in-out; }
        .shaking-e { animation: shake-e 0.3s ease-in-out; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stage">
        <div id="player" class="animal">
            <span class="player-star">★</span>
            <span id="p-emoji">🐘</span>
            <div class="name-tag" id="p-name">きみ</div>
        </div>
        <div id="enemy" class="animal">
            <div class="player-star" style="visibility: hidden;">★</div> <span id="e-emoji">🦁</span>
            <div class="name-tag" id="e-name">ライオン</div>
        </div>
    </div>
    
    <div id="input-area" class="disabled" onmousedown="pushPlayer(event)" ontouchstart="pushPlayer(event)">
        <div id="input-message"></div>
    </div>
</div>

<div id="msg-overlay">
    <div id="title-text">どすこい！<br>どうぶつ場所</div>
    <div id="start-btn" class="btn" onclick="startGame()">はじめる</div>
</div>

<script>
    const animals = [
        {emoji: '🐘', name: 'ぞう'}, {emoji: '🦁', name: 'らいおん'},
        {emoji: '🐼', name: 'ぱんだ'}, {emoji: '🐯', name: 'とら'},
        {emoji: '🐰', name: 'うさぎ'}, {emoji: '🐨', name: 'こあら'},
        {emoji: '🐵', name: 'さる'}, {emoji: '🐸', name: 'かえる'},
        {emoji: '🐶', name: 'いぬ'}, {emoji: '🐱', name: 'ねこ'}
    ];

    let playerPos = 50; 
    let isPlaying = false;
    let inputEnabled = false;
    let comTimer = null;

    const playerEl = document.getElementById('player');
    const enemyEl = document.getElementById('enemy');
    const inputAreaEl = document.getElementById('input-area');
    const inputMessageEl = document.getElementById('input-message');
    const overlay = document.getElementById('msg-overlay');
    const titleText = document.getElementById('title-text');

    function startGame() {
        // --- 重複しない抽選ロジック ---
        // 1. プレイヤーを抽選
        const pIndex = Math.floor(Math.random() * animals.length);
        const pChoice = animals[pIndex];

        // 2. プレイヤー以外から敵を抽選
        const otherAnimals = animals.filter((_, index) => index !== pIndex);
        const eChoice = otherAnimals[Math.floor(Math.random() * otherAnimals.length)];

        document.getElementById('p-emoji').innerText = pChoice.emoji;
        document.getElementById('p-name').innerText = pChoice.name;
        document.getElementById('e-emoji').innerText = eChoice.emoji;
        document.getElementById('e-name').innerText = eChoice.name;

        playerPos = 50; 
        updatePosition();
        overlay.style.display = 'none';
        isPlaying = true;
        inputEnabled = false;
        inputAreaEl.classList.add('disabled');

        if (comTimer) clearTimeout(comTimer);
        startCountdown();
    }

    function startCountdown() {
        showCountMessage('<span class="count-number">3</span>');
        setTimeout(() => isPlaying && showCountMessage('<span class="count-number">2</span>'), 1000);
        setTimeout(() => isPlaying && showCountMessage('<span class="count-number">1</span>'), 2000);
        setTimeout(() => {
            if (!isPlaying) return;
            showCountMessage('はっけよーい、のこった！');
            playerEl.classList.add('shaking-p');
            enemyEl.classList.add('shaking-e');
            setTimeout(() => {
                playerEl.classList.remove('shaking-p');
                enemyEl.classList.remove('shaking-e');
            }, 300);

            inputEnabled = true;
            inputAreaEl.classList.remove('disabled');
            scheduleNextComAttack();
            
            setTimeout(() => {
                if (isPlaying && inputEnabled) showCountMessage('ここを たたいてね！');
            }, 500);
        }, 3000);
    }

    function showCountMessage(msg) {
        inputMessageEl.innerHTML = msg;
    }

    function scheduleNextComAttack() {
        if (!isPlaying || !inputEnabled) return;

        let delay;
        // プレイヤーが勝利ライン(80%)の3タップ分(9%)手前、71%以上に到達したらブースト
        if (playerPos >= 71) {
            delay = 500 + Math.random() * 500; // 0.5〜1.0秒
        } else {
            delay = 1000 + Math.random() * 2000; // 通常
        }
        
        comTimer = setTimeout(comAttackLoop, delay);
    }

    function comAttackLoop() {
        if (!isPlaying || !inputEnabled) return;
        playerPos -= 5;
        checkWinner();
        if (isPlaying) scheduleNextComAttack();
    }

    function pushPlayer(e) {
        if (!isPlaying || !inputEnabled) return;
        if (e) e.preventDefault();
        
        playerPos += 3;

        const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth/2;
        const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight * 0.8;
        createParticle(x, y);
        
        checkWinner();
    }

    function updatePosition() {
        // 二体の接点を常に一箇所に固定
        playerEl.style.left = playerPos + '%';
        enemyEl.style.left = playerPos + '%';
    }

    function checkWinner() {
        updatePosition();
        if (playerPos > 85) { // 端まで押し切るよう少し調整
            endGame('やったー！<br>' + document.getElementById('p-name').innerText + 'の かち！ 👑');
        } else if (playerPos < 15) {
            endGame('ざんねん！<br>まけちゃった 😭');
        }
    }

    function endGame(msg) {
        isPlaying = false;
        inputEnabled = false;
        inputAreaEl.classList.add('disabled');
        if (comTimer) clearTimeout(comTimer);
        titleText.innerHTML = msg;
        document.getElementById('start-btn').innerText = 'もう一回あそぶ';
        overlay.style.display = 'flex';
        showCountMessage('');
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = '⭐';
        p.style.left = (x - 20) + 'px';
        p.style.top = (y - 20) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 500);
    }
</script>

</body>
</html>
