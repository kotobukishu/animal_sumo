<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>どすこい！どうぶつ場所（バランス調整版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fdf5e6;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #stage {
            flex: 1;
            width: 100%;
            position: relative;
            background: radial-gradient(circle, #e0c5a0 60%, #8b4513 61%, #8b4513 63%, transparent 64%);
            overflow: hidden;
        }

        /* 接点となる透明な基準線 */
        #contact-point {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transition: left 0.1s ease-out;
            z-index: 10;
        }

        .animal-wrapper {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            white-space: nowrap;
        }

        #player-wrapper {
            right: 0;
            padding-right: 2px;
        }

        #enemy-wrapper {
            left: 0;
            padding-left: 2px;
        }

        .emoji {
            font-size: 80px;
            line-height: 1;
            display: block;
        }

        #p-emoji { transform: scaleX(1); }
        #e-emoji { transform: scaleX(-1); }

        .player-star {
            color: gold;
            font-size: 40px;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            animation: star-blink 1s infinite alternate;
        }

        @keyframes star-blink {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .name-tag {
            font-size: 16px;
            background: white;
            padding: 2px 8px;
            border-radius: 10px;
            color: #333;
            font-weight: bold;
            border: 2px solid #ccc;
            margin-top: 5px;
        }

        #input-area {
            height: 40%;
            background-color: #ff6347;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #input-area.disabled { background-color: #ccc; }

        #input-message {
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }

        #msg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .btn {
            background: #fff;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 50px;
            border: 4px solid #ff6347;
            margin-top: 20px;
            cursor: pointer;
        }

        #title-text {
            color: white;
            font-size: 36px;
            text-align: center;
            line-height: 1.4;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: pop 0.5s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2) translateY(-50px); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .shaking { animation: shake 0.2s ease-in-out infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stage">
        <div id="contact-point">
            <div id="player-wrapper" class="animal-wrapper">
                <span class="player-star">★</span>
                <span id="p-emoji" class="emoji">🐘</span>
                <div class="name-tag" id="p-name">きみ</div>
            </div>
            <div id="enemy-wrapper" class="animal-wrapper">
                <span id="e-emoji" class="emoji">🦁</span>
                <div class="name-tag" id="e-name">ライオン</div>
            </div>
        </div>
    </div>
    <div id="input-area" class="disabled" onmousedown="pushPlayer(event)" ontouchstart="pushPlayer(event)">
        <div id="input-message"></div>
    </div>
</div>

<div id="msg-overlay">
    <div id="title-text">どすこい！<br>どうぶつ場所</div>
    <div id="start-btn" class="btn" onclick="startGame()">はじめる</div>
</div>

<script>
    // ==========================================
    //   バランス調整領域 (ここを書き換えて調整)
    // ==========================================
    const CONFIG = {
        PLAYER_TAP_POWER: 3,      // 1タップでプレイヤーが押す力 (%)
        COM_PUSH_POWER: 5,        // 敵の1攻撃で押し返される力 (%)
        
        WIN_LINE: 90,             // この%を超えたら勝利
        LOSE_LINE: 10,            // この%を下回ったら敗北

        // 敵のスピード設定（ミリ秒：1000 = 1秒）
        NORMAL_SPEED_MIN: 1000,   // 通常時の敵攻撃間隔（最短）
        NORMAL_SPEED_MAX: 2500,   // 通常時の敵攻撃間隔（最長）
        
        // 追い詰められた（敵が本気を出す）設定
        DANGER_TAP_COUNT: 5,      // 中央(50%)から何タップ押し込んだら敵が本気になるか
        DANGER_SPEED_MIN: 400,    // 本気時の敵攻撃間隔（最短）
        DANGER_SPEED_MAX: 800    // 本気時の敵攻撃間隔（最長）
    };

    // 本気モードが発動する座標を自動計算
    const DANGER_THRESHOLD = 50 + (CONFIG.DANGER_TAP_COUNT * CONFIG.PLAYER_TAP_POWER);
    // ==========================================

    const animals = [
        {emoji: '🐘', name: 'ぞう'}, {emoji: '🦁', name: 'らいおん'},
        {emoji: '🐼', name: 'ぱんだ'}, {emoji: '🐯', name: 'とら'},
        {emoji: '🐰', name: 'うさぎ'}, {emoji: '🐨', name: 'こあら'},
        {emoji: '🐵', name: 'さる'}, {emoji: '🐸', name: 'かえる'},
        {emoji: '🐶', name: 'いぬ'}, {emoji: '🐱', name: 'ねこ'}
    ];

    let playerPos = 50; 
    let isPlaying = false;
    let inputEnabled = false;
    let comTimer = null;

    const contactPoint = document.getElementById('contact-point');
    const playerWrapper = document.getElementById('player-wrapper');
    const enemyWrapper = document.getElementById('enemy-wrapper');
    const inputAreaEl = document.getElementById('input-area');
    const inputMessageEl = document.getElementById('input-message');
    const overlay = document.getElementById('msg-overlay');
    const titleText = document.getElementById('title-text');

    function startGame() {
        const pIndex = Math.floor(Math.random() * animals.length);
        const pChoice = animals[pIndex];
        const otherAnimals = animals.filter((_, index) => index !== pIndex);
        const eChoice = otherAnimals[Math.floor(Math.random() * otherAnimals.length)];

        document.getElementById('p-emoji').innerText = pChoice.emoji;
        document.getElementById('p-name').innerText = pChoice.name;
        document.getElementById('e-emoji').innerText = eChoice.emoji;
        document.getElementById('e-name').innerText = eChoice.name;

        playerPos = 50; 
        updatePosition();
        overlay.style.display = 'none';
        isPlaying = true;
        inputEnabled = false;
        inputAreaEl.classList.add('disabled');

        if (comTimer) clearTimeout(comTimer);
        startCountdown();
    }

    function startCountdown() {
        showCountMessage('3');
        setTimeout(() => isPlaying && showCountMessage('2'), 1000);
        setTimeout(() => isPlaying && showCountMessage('1'), 2000);
        setTimeout(() => {
            if (!isPlaying) return;
            showCountMessage('のこった！');
            playerWrapper.classList.add('shaking');
            enemyWrapper.classList.add('shaking');
            setTimeout(() => {
                playerWrapper.classList.remove('shaking');
                enemyWrapper.classList.remove('shaking');
            }, 300);

            inputEnabled = true;
            inputAreaEl.classList.remove('disabled');
            scheduleNextComAttack();
        }, 3000);
    }

    function showCountMessage(msg) {
        inputMessageEl.innerHTML = msg;
    }

    function scheduleNextComAttack() {
        if (!isPlaying || !inputEnabled) return;
        
        let min, max;
        // プレイヤーが指定タップ数以上押し込んでいたらスピードアップ
        if (playerPos >= DANGER_THRESHOLD) {
            min = CONFIG.DANGER_SPEED_MIN;
            max = CONFIG.DANGER_SPEED_MAX;
        } else {
            min = CONFIG.NORMAL_SPEED_MIN;
            max = CONFIG.NORMAL_SPEED_MAX;
        }
        
        const delay = min + Math.random() * (max - min);
        comTimer = setTimeout(comAttackLoop, delay);
    }

    function comAttackLoop() {
        if (!isPlaying || !inputEnabled) return;
        playerPos -= CONFIG.COM_PUSH_POWER;
        checkWinner();
        if (isPlaying) scheduleNextComAttack();
    }

    function pushPlayer(e) {
        if (!isPlaying || !inputEnabled) return;
        if (e) e.preventDefault();
        playerPos += CONFIG.PLAYER_TAP_POWER;
        
        const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth/2;
        const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight * 0.8;
        createParticle(x, y);
        checkWinner();
    }

    function updatePosition() {
        contactPoint.style.left = playerPos + '%';
    }

    function checkWinner() {
        updatePosition();
        if (playerPos > CONFIG.WIN_LINE) endGame('かち！ 👑');
        else if (playerPos < CONFIG.LOSE_LINE) endGame('まけ... 😭');
    }

    function endGame(msg) {
        isPlaying = false;
        inputEnabled = false;
        inputAreaEl.classList.add('disabled');
        if (comTimer) clearTimeout(comTimer);
        titleText.innerHTML = msg;
        overlay.style.display = 'flex';
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = '⭐';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 500);
    }
</script>

</body>
</html>
