<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>どすこい！どうぶつ場所（完全内部管理版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fdf5e6;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #stage {
            flex: 1;
            width: 100%;
            position: relative;
            background: radial-gradient(circle, #e0c5a0 60%, #8b4513 61%, #8b4513 63%, transparent 64%);
            overflow: hidden;
        }

        /* 接点となる透明な基準線 */
        #contact-point {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transition: left 0.1s ease-out;
            z-index: 10;
        }

        .animal-wrapper {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            white-space: nowrap;
        }

        #player-wrapper {
            right: 0;
            padding-right: 2px;
        }

        #enemy-wrapper {
            left: 0;
            padding-left: 2px;
        }

        .emoji {
            font-size: 80px;
            line-height: 1;
            display: block;
        }

        #p-emoji { transform: scaleX(1); }
        #e-emoji { transform: scaleX(-1); }

        .player-star {
            color: gold;
            font-size: 40px;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            animation: star-blink 1s infinite alternate;
        }

        @keyframes star-blink {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .name-tag {
            font-size: 16px;
            background: white;
            padding: 2px 8px;
            border-radius: 10px;
            color: #333;
            font-weight: bold;
            border: 2px solid #ccc;
            margin-top: 5px;
        }

        #input-area {
            height: 40%;
            background-color: #ff6347;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #input-area.disabled { background-color: #ccc; }

        #input-message {
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }

        #msg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .btn {
            background: #fff;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 50px;
            border: 4px solid #ff6347;
            margin-top: 20px;
            cursor: pointer;
        }

        #title-text {
            color: white;
            font-size: 36px;
            text-align: center;
            line-height: 1.4;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: pop 0.5s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2) translateY(-50px); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .shaking { animation: shake 0.2s ease-in-out infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stage">
        <div id="contact-point">
            <div id="player-wrapper" class="animal-wrapper">
                <span class="player-star">★</span>
                <span id="p-emoji" class="emoji">🐘</span>
                <div class="name-tag" id="p-name">きみ</div>
            </div>
            <div id="enemy-wrapper" class="animal-wrapper">
                <span id="e-emoji" class="emoji">🦁</span>
                <div class="name-tag" id="e-name">ライオン</div>
            </div>
        </div>
    </div>
    <div id="input-area" class="disabled" onmousedown="pushPlayer(event)" ontouchstart="pushPlayer(event)">
        <div id="input-message"></div>
    </div>
</div>

<div id="msg-overlay">
    <div id="title-text">どすこい！<br>どうぶつ場所</div>
    <div id="start-btn" class="btn" onclick="startGame()">はじめる</div>
</div>

<script>
    // ============================================================
    // ★ データ編集エリア (ここを自由に書き換えてください) ★
    // ============================================================
    
    // プレイヤー（あなた）の設定
    const PLAYER_CONFIG = {
        name: "きみ",
        emoji: "🐘",
        tapPower: 3       // 1タップで押す力 (%)
    };

    // ステージごとの敵キャラクター設定 (上から順に登場します)
    const STAGE_DATA = [
        {
            name: "うさぎ", emoji: "🐰", comPower: 3.5,
            normalMin: 1200, normalMax: 2000, 
            dangerTap: 8, dangerMin: 600, dangerMax: 1200
        },
        {
            name: "いぬ", emoji: "🐶", comPower: 4.5,
            normalMin: 1000, normalMax: 1800, 
            dangerTap: 7, dangerMin: 500, dangerMax: 1000
        },
        {
            name: "とら", emoji: "🐯", comPower: 5.5,
            normalMin: 800, normalMax: 1500, 
            dangerTap: 6, dangerMin: 400, dangerMax: 800
        },
        {
            name: "らいおん", emoji: "🦁", comPower: 7.0,
            normalMin: 600, normalMax: 1200, 
            dangerTap: 5, dangerMin: 300, dangerMax: 600
        }
    ];

    const WIN_LINE = 85;  // これ以上押せば勝ち
    const LOSE_LINE = 15; // これ以上押されたら負け

    // ============================================================
    // ★ システム領域 (ここから下は基本いじらなくてOK) ★
    // ============================================================

    let currentStageIndex = 0;
    let playerPos = 50; 
    let isPlaying = false;
    let inputEnabled = false;
    let comTimer = null;

    const contactPoint = document.getElementById('contact-point');
    const playerWrapper = document.getElementById('player-wrapper');
    const enemyWrapper = document.getElementById('enemy-wrapper');
    const inputAreaEl = document.getElementById('input-area');
    const inputMessageEl = document.getElementById('input-message');
    const overlay = document.getElementById('msg-overlay');
    const titleText = document.getElementById('title-text');

    // 初期化
    document.getElementById('p-emoji').innerText = PLAYER_CONFIG.emoji;
    document.getElementById('p-name').innerText = PLAYER_CONFIG.name;

    function startGame() {
        const enemy = STAGE_DATA[currentStageIndex];
        
        // UI更新
        document.getElementById('e-emoji').innerText = enemy.emoji;
        document.getElementById('e-name').innerText = enemy.name;

        playerPos = 50; 
        updatePosition();
        overlay.style.display = 'none';
        isPlaying = true;
        inputEnabled = false;
        inputAreaEl.classList.add('disabled');

        if (comTimer) clearTimeout(comTimer);
        startCountdown();
    }

    function startCountdown() {
        showCountMessage('3');
        setTimeout(() => isPlaying && showCountMessage('2'), 1000);
        setTimeout(() => isPlaying && showCountMessage('1'), 2000);
        setTimeout(() => {
            if (!isPlaying) return;
            showCountMessage('のこった！');
            playerWrapper.classList.add('shaking');
            enemyWrapper.classList.add('shaking');
            setTimeout(() => {
                playerWrapper.classList.remove('shaking');
                enemyWrapper.classList.remove('shaking');
            }, 300);

            inputEnabled = true;
            inputAreaEl.classList.remove('disabled');
            scheduleNextComAttack();
        }, 3000);
    }

    function showCountMessage(msg) {
        inputMessageEl.innerHTML = msg;
    }

    function scheduleNextComAttack() {
        if (!isPlaying || !inputEnabled) return;
        
        const enemy = STAGE_DATA[currentStageIndex];
        const dangerThreshold = 50 + (enemy.dangerTap * PLAYER_CONFIG.tapPower);

        let min, max;
        if (playerPos >= dangerThreshold) {
            min = enemy.dangerMin; max = enemy.dangerMax;
        } else {
            min = enemy.normalMin; max = enemy.normalMax;
        }
        
        const delay = min + Math.random() * (max - min);
        comTimer = setTimeout(comAttackLoop, delay);
    }

    function comAttackLoop() {
        if (!isPlaying || !inputEnabled) return;
        playerPos -= STAGE_DATA[currentStageIndex].comPower;
        checkWinner();
        if (isPlaying) scheduleNextComAttack();
    }

    function pushPlayer(e) {
        if (!isPlaying || !inputEnabled) return;
        if (e) e.preventDefault();
        playerPos += PLAYER_CONFIG.tapPower;
        
        const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth/2;
        const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight * 0.8;
        createParticle(x, y);
        checkWinner();
    }

    function updatePosition() {
        contactPoint.style.left = playerPos + '%';
    }

    function checkWinner() {
        updatePosition();
        if (playerPos > WIN_LINE) {
            if (currentStageIndex < STAGE_DATA.length - 1) {
                currentStageIndex++;
                endGame('かち！ 👑<br>つぎの あいてが くるぞ！', 'つぎへ');
            } else {
                currentStageIndex = 0;
                endGame('全ステージクリア！<br>きみが最強の横綱だ！ 🏆', 'もう一度あそぶ');
            }
        }
        else if (playerPos < LOSE_LINE) {
            endGame('まけ... 😭', 'もう一度あそぶ');
        }
    }

    function endGame(msg, btnText) {
        isPlaying = false;
        inputEnabled = false;
        inputAreaEl.classList.add('disabled');
        if (comTimer) clearTimeout(comTimer);
        titleText.innerHTML = msg;
        document.getElementById('start-btn').innerText = btnText;
        overlay.style.display = 'flex';
        showCountMessage('');
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = '⭐';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 500);
    }
</script>

</body>
</html>
